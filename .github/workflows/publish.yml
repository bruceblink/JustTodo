name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (example: v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create/update release as draft"
        required: false
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      release_body: ${{ steps.drafter.outputs.body != '' && steps.drafter.outputs.body || steps.notes.outputs.body }}
      draft: ${{ steps.draft.outputs.value }}
      updater_enabled: ${{ steps.features.outputs.updater_enabled }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ inputs.tag }}"

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate repository versions match tag
        shell: bash
        run: |
          export EXPECTED_VERSION="${{ steps.meta.outputs.version }}"
          node - <<'EOF'
          const fs = require("fs");

          const expected = process.env.EXPECTED_VERSION;
          const checks = {
            "package.json": JSON.parse(fs.readFileSync("package.json", "utf8")).version,
            "src-tauri/package.json": JSON.parse(fs.readFileSync("src-tauri/package.json", "utf8")).version,
            "src-tauri/tauri.conf.json": JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version,
          };

          const cargo = fs.readFileSync("Cargo.toml", "utf8");
          const cargoMatch = cargo.match(/^version = "([0-9]+\.[0-9]+\.[0-9]+)"/m);
          checks["Cargo.toml"] = cargoMatch ? cargoMatch[1] : null;

          const mismatches = Object.entries(checks)
            .filter(([, v]) => v !== expected)
            .map(([k, v]) => `${k}: found "${v}", expected "${expected}"`);

          if (mismatches.length > 0) {
            console.error("Version mismatch detected:");
            for (const m of mismatches) console.error(`  - ${m}`);
            process.exit(1);
          }
          EOF

      - name: Resolve draft mode
        id: draft
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve feature flags
        id: features
        shell: bash
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const updaterEnabled = pkg?.scaffold?.features?.updater !== false;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `updater_enabled=${updaterEnabled}\n`);
          EOF

      - name: Validate updater signing secrets
        if: steps.features.outputs.updater_enabled == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          missing=0

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY while updater is enabled."
            missing=1
          fi

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD while updater is enabled."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate release notes with Release Drafter
        id: drafter
        continue-on-error: true
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: release-drafter.yml
          disable-autolabeler: true
          version: ${{ steps.meta.outputs.version }}
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ github.event.repository.name }} ${{ steps.meta.outputs.version }}

      - name: Generate fallback release notes
        id: notes
        if: steps.drafter.outputs.body == ''
        shell: bash
        run: |
          CUR="${{ steps.meta.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -v "^$CUR$" | head -n 1)

          if [ -z "$PREV" ]; then
            LOG=$(git log HEAD --pretty="- %s (%h)" --no-merges | head -50 || true)
          else
            LOG=$(git log "$PREV..HEAD" --pretty="- %s (%h)" --no-merges | head -50 || true)
          fi

          {
            echo "## What's Changed"
            echo
            echo "${LOG:-- Initial release}"
            echo
            [ -n "$PREV" ] && echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/$PREV...$CUR"
          } > notes.md

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--no-sign --target universal-apple-darwin"
          - os: ubuntu-22.04
            args: ""
          - os: windows-latest
            args: "--bundles nsis,msi"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.preflight.outputs.tag }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ -> target

      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Windows NSIS
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Import Apple certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT"
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$APPLE_CERTIFICATE_PASSWORD" -A -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ""
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./
          tagName: ${{ needs.preflight.outputs.tag }}
          releaseName: ${{ github.event.repository.name }} ${{ needs.preflight.outputs.version }}
          releaseBody: ${{ needs.preflight.outputs.release_body }}
          releaseDraft: ${{ needs.preflight.outputs.draft }}
          includeUpdaterJson: ${{ needs.preflight.outputs.updater_enabled }}
          args: ${{ matrix.args }}
